services:
  postgres:
    image: postgres:16
    container_name: deas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - deas_postgres_data:/var/lib/postgresql/data

volumes:
  deas_postgres_data:
